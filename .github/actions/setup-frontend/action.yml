name: Setup Frontend
description: Setup Node with npm cache and install frontend dependencies. Checkout must run before this.

inputs:
  node-version:
    description: Node version to use.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: cd frontend && npm ci
      shell: bash