name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      openapi: ${{ steps.filter.outputs.openapi }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            python:
              - 'cardre/**'
              - 'sidecar/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'scripts/**'
              - 'tools/**'
              - 'Makefile'
              - '.github/dependabot.yml'
            frontend:
              - 'frontend/**'
              - '!frontend/src-tauri/**'
            rust:
              - 'frontend/src-tauri/**'
            sidecar:
              - 'cardre/**'
              - 'sidecar/**'
              - 'frontend/src-tauri/**'
              - 'scripts/build-sidecar.sh'
              - 'pyproject.toml'
            openapi:
              - 'sidecar/**'
              - 'cardre/**'
              - 'frontend/src/api/**'
              - 'scripts/generate-openapi-types.py'
            docs:
              - '**/*.md'
              - 'docs/**'

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: dev,sidecar
      - name: Ruff check
        run: ruff check
      - name: Check line counts
        run: python3 scripts/check-line-counts.py
      - name: Check sidecar naming consistency
        run: python3 scripts/check-sidecar-naming.py

  check-docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.docs == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check doc references
        run: python3 scripts/check_doc_references.py

  typecheck-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: dev,sidecar
      - name: Mypy
        run: python3 -m mypy --explicit-package-bases cardre

  typecheck-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      # TypeScript check and Vite build skipped during architecture rewrite
      # (Batches 01-06). The new API only has /health and /projects; the
      # frontend references plans/runs/evidence schemas not yet registered.
      # Restored in Batch 07.
      - name: TypeScript check
        if: false
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Vite build
        if: false
        run: npm run build

  test-python:
    needs: [detect-changes, lint, typecheck-python]
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: sidecar,dev,test
      - name: Audit artifact reads
        run: make audit-artifact-reads
      - name: Run tests
        run: make test-python-ci
    
  test-python-governance:
    needs: [detect-changes, lint, typecheck-python]
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARDRE_GOVERNANCE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: sidecar,test
      - name: Run governance tests
        run: python3 -m pytest -m governance -q --tb=short --no-cov

  test-frontend:
    needs: [detect-changes, typecheck-frontend]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm test

  build-sidecar:
    needs: detect-changes
    if: needs.detect-changes.outputs.sidecar == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: sidecar
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build sidecar
        run: bash scripts/build-sidecar.sh
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/cardre-api-*

  check-tauri:
    needs: [detect-changes, build-sidecar]
    if: needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "frontend/src-tauri"
      - name: Download sidecar binary
        uses: actions/download-artifact@v8
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/
      - name: Validate sidecar exists
        working-directory: frontend/src-tauri
        run: |
          ls -la binaries/
          file binaries/cardre-api-*
      - name: cargo fmt --check
        working-directory: frontend/src-tauri
        run: cargo fmt --check
      - name: cargo check
        working-directory: frontend/src-tauri
        run: cargo check
      - name: cargo clippy
        working-directory: frontend/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  smoke-test-packaged-sidecar:
    needs: [detect-changes, build-sidecar]
    if: needs.detect-changes.outputs.sidecar == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "frontend/src-tauri"
      - name: Download sidecar binary
        uses: actions/download-artifact@v8
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/
      - name: Make sidecar executable
        run: chmod +x frontend/src-tauri/binaries/cardre-api-*
      - name: Verify naming + resolution contract
        working-directory: frontend/src-tauri
        run: cargo test --test sidecar_resolution -- --nocapture
      - name: Naming guard
        run: python3 scripts/check-sidecar-naming.py
      - name: Assert resource path compiles (cargo check with artifact present)
        working-directory: frontend/src-tauri
        run: cargo check

  smoke-test-sidecar:
    needs: [detect-changes, build-sidecar]
    if: needs.detect-changes.outputs.sidecar == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: sidecar,test
      - name: Download sidecar binary
        uses: actions/download-artifact@v8
        with:
          name: cardre-api-sidecar
          path: binaries/
      - name: Make binary executable
        run: chmod +x binaries/cardre-api-*
      - name: Launch sidecar and wait for health
        run: |
          BINARY=$(ls binaries/cardre-api-*-linux-* binaries/cardre-api-x86_64-unknown-linux-gnu 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: No Linux sidecar binary found in artifact"
            ls -la binaries/
            exit 1
          fi
          # Allocate an available ephemeral loopback port
          PORT=$(python3 -c "import socket; s=socket.socket(); s.bind(('127.0.0.1',0)); print(s.getsockname()[1]); s.close()")
          echo "Launching $BINARY on port $PORT"
          CARDRE_API_PORT=$PORT $BINARY &
          SIDECAR_PID=$!
          # Install cleanup trap immediately after launch
          cleanup() { kill "$SIDECAR_PID" 2>/dev/null || true; }
          trap cleanup EXIT INT TERM
          echo "Sidecar PID: $SIDECAR_PID"
          for i in $(seq 1 30); do
            if python3 -c "import httpx; r = httpx.get('http://127.0.0.1:$PORT/health', timeout=2); assert r.json().get('status') == 'ok'; print('HEALTHY')" 2>/dev/null; then
              echo "Sidecar is healthy"
              # Naming guard: the artifact must be triple-suffixed for Tauri.
              case "$BINARY" in
                *cardre-api-*-unknown-linux-gnu) echo "Naming OK: $BINARY" ;;
                *) echo "ERROR: sidecar not triple-suffixed: $BINARY"; exit 1 ;;
              esac
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Sidecar did not become healthy within 30 seconds"
          exit 1

  check-api-contracts:
    needs: detect-changes
    if: needs.detect-changes.outputs.openapi == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          extras: sidecar
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate OpenAPI types
        run: python3 scripts/generate-openapi-types.py
      - name: Check for stale generated types
        run: git diff --exit-code

  ci-success:
    needs:
      - detect-changes
      - lint
      - check-docs
      - typecheck-python
      - typecheck-frontend
      - test-python
      - test-python-governance
      - test-frontend
      - build-sidecar
      - check-tauri
      - smoke-test-packaged-sidecar
      - smoke-test-sidecar
      - check-api-contracts
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required CI jobs
        env:
          DETECT_CHANGES: ${{ needs.detect-changes.result }}
          LINT: ${{ needs.lint.result }}
          CHECK_DOCS: ${{ needs.check-docs.result }}
          TYPECHECK_PYTHON: ${{ needs.typecheck-python.result }}
          TYPECHECK_FRONTEND: ${{ needs.typecheck-frontend.result }}
          TEST_PYTHON: ${{ needs.test-python.result }}
          TEST_PYTHON_GOVERNANCE: ${{ needs.test-python-governance.result }}
          TEST_FRONTEND: ${{ needs.test-frontend.result }}
          BUILD_SIDECAR: ${{ needs.build-sidecar.result }}
          CHECK_TAURI: ${{ needs.check-tauri.result }}
          SMOKE_TEST_PACKAGED_SIDECAR: ${{ needs.smoke-test-packaged-sidecar.result }}
          SMOKE_TEST_SIDECAR: ${{ needs.smoke-test-sidecar.result }}
          CHECK_API_CONTRACTS: ${{ needs.check-api-contracts.result }}
        run: |
          failures=0
          for job in \
            "detect-changes:$DETECT_CHANGES" \
            "lint:$LINT" \
            "check-docs:$CHECK_DOCS" \
            "typecheck-python:$TYPECHECK_PYTHON" \
            "typecheck-frontend:$TYPECHECK_FRONTEND" \
            "test-python:$TEST_PYTHON" \
            "test-python-governance:$TEST_PYTHON_GOVERNANCE" \
            "test-frontend:$TEST_FRONTEND" \
            "build-sidecar:$BUILD_SIDECAR" \
            "check-tauri:$CHECK_TAURI" \
            "smoke-test-packaged-sidecar:$SMOKE_TEST_PACKAGED_SIDECAR" \
            "smoke-test-sidecar:$SMOKE_TEST_SIDECAR" \
            "check-api-contracts:$CHECK_API_CONTRACTS"
          do
            name=${job%%:*}
            result=${job#*:}
            case "$result" in
              success|skipped|neutral)
                echo "$name: $result"
                ;;
              *)
                echo "$name: $result"
                failures=1
                ;;
            esac
          done
          exit $failures
