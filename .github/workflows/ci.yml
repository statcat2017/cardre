name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[sidecar,test]"
      - name: Ruff check
        # Non-blocking baseline: 359 pre-existing F401/F841 errors.
        # Remove continue-on-error once those are fixed.
        continue-on-error: true
        run: pip install ruff==0.15.20 && ruff check
      - name: Check line counts
        run: python3 scripts/check-line-counts.py
      - name: Check doc references
        run: python3 scripts/check_doc_references.py

  typecheck-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: ESLint
        # Non-blocking baseline: 5 pre-existing errors (hoisting, setState-in-effect).
        # Remove continue-on-error once those are fixed.
        continue-on-error: true
        run: npm run lint
      - name: Prettier check
        # Non-blocking baseline: 69 files need formatting.
        # Remove continue-on-error once those are fixed.
        continue-on-error: true
        run: npm run format:check

  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[sidecar,test]"
      - name: Audit artifact reads
        run: make audit-artifact-reads
      - name: Run tests
        run: python3 -m pytest tests/ -q --tb=short --cov-fail-under=75

  test-frontend:
    runs-on: ubuntu-latest
    needs: [typecheck-frontend]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  build-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[sidecar]"
      - name: Build sidecar
        run: bash scripts/build-sidecar.sh
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/cardre-api-*

  check-tauri:
    runs-on: ubuntu-latest
    needs: [build-sidecar]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "frontend/src-tauri"
      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/
      - name: Validate sidecar exists
        working-directory: frontend/src-tauri
        run: |
          ls -la binaries/
          file binaries/cardre-api-*
      - name: cargo fmt --check
        working-directory: frontend/src-tauri
        run: cargo fmt --check
      - name: cargo check
        working-directory: frontend/src-tauri
        run: cargo check
      - name: cargo clippy
        working-directory: frontend/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  smoke-test-sidecar:
    runs-on: ubuntu-latest
    needs: [build-sidecar]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install httpx for health check
        run: pip install httpx
      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: cardre-api-sidecar
          path: binaries/
      - name: Make binary executable
        run: chmod +x binaries/cardre-api-*
      - name: Launch sidecar and wait for health
        run: |
          BINARY=$(ls binaries/cardre-api-*-linux-* binaries/cardre-api-x86_64-unknown-linux-gnu 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: No Linux sidecar binary found in artifact"
            ls -la binaries/
            exit 1
          fi
          echo "Launching $BINARY on port 18000"
          $BINARY 18000 &
          SIDECAR_PID=$!
          echo "Sidecar PID: $SIDECAR_PID"
          for i in $(seq 1 30); do
            if python3 -c "import httpx; r = httpx.get('http://127.0.0.1:18000/health', timeout=2); assert r.json().get('status') == 'ok'; print('HEALTHY')" 2>/dev/null; then
              echo "Sidecar is healthy"
              kill $SIDECAR_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Sidecar did not become healthy within 30 seconds"
          kill $SIDECAR_PID 2>/dev/null || true
          exit 1

  check-api-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install sidecar deps
        run: pip install -e ".[sidecar]"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Generate OpenAPI types
        run: python3 scripts/generate-openapi-types.py
      - name: Check for stale generated types
        id: check-types
        run: git diff --exit-code || echo "stale=true" >> "$GITHUB_OUTPUT"
      - name: Auto-fix stale generated types
        if: steps.check-types.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/api/openapi.json frontend/src/api/schema.d.ts
          git commit -m "chore: regenerate OpenAPI types [skip ci]"
          git push
