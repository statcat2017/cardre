name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  check-line-counts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check line counts
        run: python3 scripts/check-line-counts.py

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ".[sidecar,test]"
      - name: Run tests
        run: python3 -m pytest tests/ -q --tb=short

  typecheck-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  check-tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: "frontend/src-tauri"
      - name: Create placeholder sidecar for cargo check
        working-directory: frontend/src-tauri
        run: |
          TARGET="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p binaries
          printf '#!/usr/bin/env sh\necho cardre-api placeholder\n' > "binaries/cardre-api-${TARGET}"
          chmod +x "binaries/cardre-api-${TARGET}"
      - name: cargo check
        working-directory: frontend/src-tauri
        run: cargo check

  check-api-contracts:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install sidecar deps
        run: pip install -e ".[sidecar]"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Generate OpenAPI types
        run: python3 scripts/generate-openapi-types.py
      - name: Check for stale generated types
        run: git diff --exit-code frontend/src/api/schema.d.ts

  build-sidecar:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[sidecar]"
      - name: Build sidecar
        run: bash scripts/build-sidecar.sh
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardre-api-sidecar
          path: frontend/src-tauri/binaries/cardre-api-*
